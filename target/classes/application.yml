spring:
  application:
    name: tip-retention

  datasource:
    url: jdbc:postgresql://localhost:5432/tip_retention
    username: ${DB_USERNAME:tip_app}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate           # Flyway owns DDL; Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
        jdbc:
          batch_size: 50

  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  servlet:
    context-path: /

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# Application-level settings
tip:
  retention:
    authorized-role: TIP-CM-RETENTION-ADMIN   # Role required for mutating operations
    cascade-batch-size: 500                   # Rows per async cascade batch
